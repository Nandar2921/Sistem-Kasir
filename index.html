<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Toko Buah - Fresh Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* Layout Grid */
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Panel */
        .panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #2ecc71;
            font-size: 1.5em;
        }

        .panel h3 {
            color: #34495e;
            margin: 20px 0 15px;
            font-size: 1.2em;
        }

        /* Search Box */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #2ecc71;
        }

        /* Grid Buah */
        .buah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }

        .buah-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .buah-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
        }

        .buah-card.selected {
            border-color: #2ecc71;
            background: #e8f8f5;
        }

        .buah-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .buah-nama {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .buah-harga {
            color: #27ae60;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .buah-harga::before {
            content: 'Rp ';
            font-size: 12px;
        }

        .buah-stok {
            color: #7f8c8d;
            font-size: 12px;
            background: #ecf0f1;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        /* Button */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
            width: 100%;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #d68910;
        }

        /* Table */
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #ecf0f1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* Total Box */
        .total-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .grand-total {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
            border-top: 2px dashed #bdc3c7;
            padding-top: 15px;
            margin-top: 15px;
        }

        /* Kembalian Box */
        .kembalian-box {
            background: #e8f8f5;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #2ecc71;
        }

        /* Aksi Group */
        .aksi-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }

        /* Badge */
        .badge {
            background: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 5px;
        }

        /* Info Stok */
        .info-stok {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥭 WAHYU BUAH 🍍</h1>
        <div class="subtitle">Toko Buah Segar - Harga Ekonomis</div>
        
        <div class="row">
            <!-- Panel Kiri: Daftar Buah -->
            <div class="panel">
                <h2>🍎 DAFTAR BUAH SEGAR</h2>
                
                <!-- Search -->
                <div class="search-box">
                    <input type="text" id="searchBuah" placeholder="🔍 Cari buah... (ketik nama buah)" onkeyup="cariBuah()">
                </div>
                
                <!-- Grid Buah -->
                <div class="buah-grid" id="buahGrid"></div>
                
                <!-- Form Tambah Produk -->
                <h3>➕ Tambah Produk Baru</h3>
                <div class="form-group">
                    <label>Nama Buah:</label>
                    <input type="text" id="namaBuah" placeholder="Contoh: Mangga Harum Manis">
                </div>
                <div class="form-group">
                    <label>Harga (Rp):</label>
                    <input type="number" id="hargaBuah" placeholder="10000">
                </div>
                <div class="form-group">
                    <label>Stok Awal:</label>
                    <input type="number" id="stokBuah" placeholder="10">
                </div>
                <button class="btn btn-primary" onclick="tambahProduk()">➕ TAMBAH PRODUK</button>
            </div>
            
            <!-- Panel Kanan: Kasir -->
            <div class="panel">
                <h2>🧾 TRANSAKSI KASIR</h2>
                
                <!-- Pilih Produk -->
                <h3>Pilih Item</h3>
                <div class="form-group">
                    <label>Pilih Buah:</label>
                    <select id="pilihProduk" class="form-control">
                        <option value="">-- Pilih Buah --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Jumlah Beli:</label>
                    <input type="number" id="jumlahBeli" value="1" min="1">
                </div>
                
                <button class="btn btn-success" onclick="tambahTransaksi()">🛒 TAMBAH KE KERANJANG</button>
                
                <!-- Keranjang -->
                <h3 style="margin-top: 25px;">🛍️ KERANJANG BELANJA</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Buah</th>
                                <th>Harga</th>
                                <th>Jml</th>
                                <th>Subtotal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="transaksiList"></tbody>
                    </table>
                </div>
                
                <!-- Total -->
                <div class="total-box">
                    <div class="total-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">Rp 0</span>
                    </div>
                    <div class="total-row">
                        <span>Diskon (10% > Rp 200rb):</span>
                        <span id="diskon">Rp 0</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>TOTAL BAYAR:</span>
                        <span id="total">Rp 0</span>
                    </div>
                </div>
                
                <!-- Pembayaran -->
                <h3>💵 PEMBAYARAN</h3>
                <div class="kembalian-box">
                    <div class="form-group">
                        <label>Uang Dibayar:</label>
                        <input type="number" id="uangBayar" placeholder="Masukkan nominal" oninput="hitungKembalian()">
                    </div>
                    <div class="total-row">
                        <span style="font-weight: bold;">Kembalian:</span>
                        <span id="kembalian" style="font-weight: bold; font-size: 24px; color: #27ae60;">Rp 0</span>
                    </div>
                </div>
                
                <!-- Aksi Cepat -->
                <div class="aksi-group">
                    <button class="btn btn-warning" onclick="resetTransaksi()">🔄 RESET</button>
                    <button class="btn btn-success" onclick="selesaiTransaksi()">✅ SELESAI & CETAK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA BUAH LENGKAP (SESUAI PESANAN LO BRO!)
        let produkList = [
            { id: 1, nama: 'Apel Fuji', harga: 60000, stok: 25, emoji: '🍎' },
            { id: 2, nama: 'Pir Madu', harga: 40000, stok: 20, emoji: '🍐' },
            { id: 3, nama: 'Jeruk Santang', harga: 60000, stok: 30, emoji: '🍊' },
            { id: 4, nama: 'Jeruk Mandarin', harga: 50000, stok: 25, emoji: '🍊' },
            { id: 5, nama: 'Jeruk Medan Besar', harga: 35000, stok: 40, emoji: '🍊' },
            { id: 6, nama: 'Jeruk Medan Kecil', harga: 30000, stok: 50, emoji: '🍊' },
            { id: 7, nama: 'Salak', harga: 18000, stok: 35, emoji: '🫘' },
            { id: 8, nama: 'Anggur Merah', harga: 120000, stok: 15, emoji: '🍇' },
            { id: 9, nama: 'Anggur Hijau', harga: 120000, stok: 15, emoji: '🍇' },
            { id: 10, nama: 'Buah Naga', harga: 30000, stok: 20, emoji: '🐉' },
            { id: 11, nama: 'Alpukat', harga: 30000, stok: 25, emoji: '🥑' },
            { id: 12, nama: 'Kelengkeng', harga: 80000, stok: 18, emoji: '🍒' },
            { id: 13, nama: 'Semangka', harga: 15000, stok: 12, emoji: '🍉' },
            { id: 14, nama: 'Melon', harga: 21000, stok: 15, emoji: '🍈' },
            { id: 15, nama: 'Pir Jambu', harga: 60000, stok: 20, emoji: '🍐' },
            { id: 16, nama: 'Nanas', harga: 15000, stok: 30, emoji: '🍍' }
        ];
        
        let transaksi = [];
        let nextId = 17;
        let filteredProduk = [...produkList];

        // Load data dari localStorage
        function loadData() {
            const savedData = localStorage.getItem('produkListTokoBuah');
            if (savedData) {
                produkList = JSON.parse(savedData);
                nextId = Math.max(...produkList.map(p => p.id)) + 1;
                filteredProduk = [...produkList];
            }
        }

        // Save data ke localStorage
        function saveData() {
            localStorage.setItem('produkListTokoBuah', JSON.stringify(produkList));
        }

        // Format Rupiah
        function formatRupiah(angka) {
            return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Cari buah
        function cariBuah() {
            const keyword = document.getElementById('searchBuah').value.toLowerCase();
            if (keyword === '') {
                filteredProduk = [...produkList];
            } else {
                filteredProduk = produkList.filter(produk => 
                    produk.nama.toLowerCase().includes(keyword)
                );
            }
            renderBuah();
        }

        // Render daftar buah
        function renderBuah() {
            const grid = document.getElementById('buahGrid');
            const select = document.getElementById('pilihProduk');
            
            grid.innerHTML = '';
            select.innerHTML = '<option value="">-- Pilih Buah --</option>';
            
            filteredProduk.forEach(produk => {
                // Card view
                const card = document.createElement('div');
                card.className = 'buah-card';
                card.setAttribute('onclick', `pilihBuah(${produk.id})`);
                card.innerHTML = `
                    <div class="buah-emoji">${produk.emoji || '🍌'}</div>
                    <div class="buah-nama">${produk.nama}</div>
                    <div class="buah-harga">${formatRupiah(produk.harga)}</div>
                    <div class="buah-stok">Stok: ${produk.stok}</div>
                `;
                grid.appendChild(card);
                
                // Select option
                const option = document.createElement('option');
                option.value = produk.id;
                option.textContent = `${produk.nama} - Rp ${formatRupiah(produk.harga)} (Stok: ${produk.stok})`;
                select.appendChild(option);
            });
        }

        // Pilih buah
        function pilihBuah(id) {
            document.getElementById('pilihProduk').value = id;
            
            // Remove selected class dari semua card
            document.querySelectorAll('.buah-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add selected class ke card yang dipilih
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('selected');
            }
        }

        // Tambah produk baru
        function tambahProduk() {
            const nama = document.getElementById('namaBuah').value;
            const harga = parseInt(document.getElementById('hargaBuah').value);
            const stok = parseInt(document.getElementById('stokBuah').value);
            
            if (!nama || !harga || !stok) {
                alert('Semua field harus diisi!');
                return;
            }
            
            if (harga <= 0 || stok <= 0) {
                alert('Harga dan stok harus lebih dari 0!');
                return;
            }
            
            produkList.push({
                id: nextId++,
                nama: nama,
                harga: harga,
                stok: stok,
                emoji: '🍌'
            });
            
            filteredProduk = [...produkList];
            
            // Reset form
            document.getElementById('namaBuah').value = '';
            document.getElementById('hargaBuah').value = '';
            document.getElementById('stokBuah').value = '';
            
            saveData();
            renderBuah();
            
            alert('Produk berhasil ditambahkan!');
        }

        // Tambah ke transaksi
        function tambahTransaksi() {
            const produkId = parseInt(document.getElementById('pilihProduk').value);
            const jumlah = parseInt(document.getElementById('jumlahBeli').value);
            
            if (!produkId) {
                alert('Pilih produk terlebih dahulu!');
                return;
            }
            
            if (jumlah <= 0) {
                alert('Jumlah harus lebih dari 0!');
                return;
            }
            
            const produk = produkList.find(p => p.id === produkId);
            
            if (!produk) {
                alert('Produk tidak ditemukan!');
                return;
            }
            
            if (produk.stok < jumlah) {
                alert(`Stok tidak cukup! Tersedia: ${produk.stok}`);
                return;
            }
            
            // Kurangi stok
            produk.stok -= jumlah;
            
            // Cek apakah produk sudah ada di transaksi
            const existingItem = transaksi.find(item => item.id === produkId);
            
            if (existingItem) {
                existingItem.jumlah += jumlah;
                existingItem.subtotal = existingItem.harga * existingItem.jumlah;
            } else {
                transaksi.push({
                    id: produk.id,
                    nama: produk.nama,
                    harga: produk.harga,
                    jumlah: jumlah,
                    subtotal: produk.harga * jumlah,
                    emoji: produk.emoji
                });
            }
            
            saveData();
            filteredProduk = [...produkList];
            renderBuah();
            renderTransaksi();
            hitungTotal();
            
            document.getElementById('jumlahBeli').value = 1;
        }

        // Render transaksi
        function renderTransaksi() {
            const tbody = document.getElementById('transaksiList');
            tbody.innerHTML = '';
            
            if (transaksi.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">Keranjang belanja masih kosong</td></tr>';
                return;
            }
            
            transaksi.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.emoji || '🍌'} ${item.nama}</td>
                    <td>Rp ${formatRupiah(item.harga)}</td>
                    <td>${item.jumlah}</td>
                    <td>Rp ${formatRupiah(item.subtotal)}</td>
                    <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="hapusItem(${index})">❌</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Hapus item dari transaksi
        function hapusItem(index) {
            const item = transaksi[index];
            
            // Kembalikan stok
            const produk = produkList.find(p => p.id === item.id);
            if (produk) {
                produk.stok += item.jumlah;
            }
            
            transaksi.splice(index, 1);
            
            saveData();
            filteredProduk = [...produkList];
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Hitung total
        function hitungTotal() {
            const subtotal = transaksi.reduce((sum, item) => sum + item.subtotal, 0);
            const diskon = subtotal > 200000 ? subtotal * 0.1 : 0;
            const total = subtotal - diskon;
            
            document.getElementById('subtotal').innerHTML = `Rp ${formatRupiah(subtotal)}`;
            document.getElementById('diskon').innerHTML = `Rp ${formatRupiah(diskon)}`;
            document.getElementById('total').innerHTML = `Rp ${formatRupiah(total)}`;
            
            hitungKembalian();
        }

        // Hitung kembalian
        function hitungKembalian() {
            const uangBayar = parseInt(document.getElementById('uangBayar').value) || 0;
            const totalText = document.getElementById('total').innerHTML;
            const total = parseInt(totalText.replace(/[^0-9]/g, '')) || 0;
            
            const kembalian = uangBayar - total;
            
            if (uangBayar > 0) {
                if (kembalian >= 0) {
                    document.getElementById('kembalian').innerHTML = `Rp ${formatRupiah(kembalian)}`;
                    document.getElementById('kembalian').style.color = '#27ae60';
                } else {
                    document.getElementById('kembalian').innerHTML = `Rp 0 (Kurang Rp ${formatRupiah(Math.abs(kembalian))})`;
                    document.getElementById('kembalian').style.color = '#e74c3c';
                }
            } else {
                document.getElementById('kembalian').innerHTML = 'Rp 0';
            }
        }

        // Reset transaksi
        function resetTransaksi() {
            if (transaksi.length > 0) {
                if (!confirm('Yakin ingin reset keranjang?')) return;
                
                // Kembalikan semua stok
                transaksi.forEach(item => {
                    const produk = produkList.find(p => p.id === item.id);
                    if (produk) {
                        produk.stok += item.jumlah;
                    }
                });
            }
            
            transaksi = [];
            document.getElementById('uangBayar').value = '';
            
            saveData();
            filteredProduk = [...produkList];
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Selesai transaksi
        function selesaiTransaksi() {
            if (transaksi.length === 0) {
                alert('Tidak ada item dalam keranjang!');
                return;
            }
            
            const uangBayar = parseInt(document.getElementById('uangBayar').value);
            const totalText = document.getElementById('total').innerHTML;
            const total = parseInt(totalText.replace(/[^0-9]/g, ''));
            
            if (!uangBayar) {
                alert('Masukkan jumlah uang bayar!');
                return;
            }
            
            if (uangBayar < total) {
                alert('Uang tidak cukup!');
                return;
            }
            
            const kembalian = uangBayar - total;
            
            // Buat struk
            let struk = '🥭 FRESH MARKET 🍍\n';
            struk += '======================\n';
            struk += new Date().toLocaleString('id-ID') + '\n';
            struk += '======================\n\n';
            
            transaksi.forEach(item => {
                struk += `${item.emoji || '🍌'} ${item.nama}\n`;
                struk += `${item.jumlah} x Rp ${formatRupiah(item.harga)} = Rp ${formatRupiah(item.subtotal)}\n`;
            });
            
            struk += '\n======================\n';
            struk += `Subtotal: Rp ${document.getElementById('subtotal').innerHTML.replace('Rp ', '')}\n`;
            struk += `Diskon 10%: Rp ${document.getElementById('diskon').innerHTML.replace('Rp ', '')}\n`;
            struk += `TOTAL: Rp ${document.getElementById('total').innerHTML.replace('Rp ', '')}\n`;
            struk += `Bayar: Rp ${formatRupiah(uangBayar)}\n`;
            struk += `Kembali: Rp ${formatRupiah(kembalian)}\n`;
            struk += '======================\n';
            struk += 'Terima Kasih!\n';
            struk += 'Belanja Lagi Ya!\n';
            
            alert(struk);
            
            // Reset transaksi
            transaksi = [];
            document.getElementById('uangBayar').value = '';
            
            saveData();
            filteredProduk = [...produkList];
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Inisialisasi
        loadData();
        renderBuah();
        renderTransaksi();
        hitungTotal();
    </script>
</body>
</html>
