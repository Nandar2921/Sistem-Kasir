<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Toko Buah - Harga Variatif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #09c234 0%, #07f159 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Button */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-success {
            background: #27ae60;
            color: white;
            width: 100%;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        /* Grid Buah */
        .buah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .buah-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .buah-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .buah-card.selected {
            border-color: #27ae60;
            background: #e8f8f5;
        }

        .buah-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .buah-nama {
            font-weight: bold;
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .harga-info {
            font-size: 13px;
            text-align: left;
            padding: 5px;
            background: white;
            border-radius: 8px;
        }

        .harga-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            color: #27ae60;
            font-weight: 500;
        }

        /* Satuan Select */
        .satuan-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Table */
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .total-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .grand-total {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
            display: flex;
            justify-content: space-between;
        }

        .kembalian-box {
            background: #e8f8f5;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #27ae60;
        }

        .aksi-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .info-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥭 WAHYU BUAH 🍍</h1>
        
        <div class="row">
            <!-- Panel Kiri: Daftar Buah & Input -->
            <div class="panel">
                <h2>📦 MASTER DATA BUAH</h2>
                
                <div class="info-box">
                    💡 Setiap buah bisa punya 3 harga: Per Kilo, 1/2 Kilo, 1/4 Kilo
                </div>
                
                <!-- Form Input Buah Baru -->
                <h3>➕ TAMBAH BUAH BARU</h3>
                <div class="form-group">
                    <label>Nama Buah:</label>
                    <input type="text" id="namaBuah" placeholder="Contoh: Apel Fuji">
                </div>
                <div class="form-group">
                    <label>Harga Per Kilo (Rp):</label>
                    <input type="number" id="hargaKilo" placeholder="60000">
                </div>
                <div class="form-group">
                    <label>Harga Setengah Kilo (Rp):</label>
                    <input type="number" id="hargaSetengah" placeholder="35000">
                </div>
                <div class="form-group">
                    <label>Harga Seperempat Kilo (Rp):</label>
                    <input type="number" id="hargaSeperempat" placeholder="18000">
                </div>
                <div class="form-group">
                    <label>Stok Awal (kg):</label>
                    <input type="number" id="stokBuah" placeholder="100" value="100">
                </div>
                <button class="btn btn-primary" onclick="tambahBuah()">➕ TAMBAH BUAH</button>
                
                <!-- Daftar Buah -->
                <h3 style="margin-top: 25px;">🍎 DAFTAR BUAH TERSEDIA</h3>
                <div class="buah-grid" id="buahGrid"></div>
            </div>
            
            <!-- Panel Kanan: Transaksi -->
            <div class="panel">
                <h2>🧾 TRANSAKSI PENJUALAN</h2>
                
                <!-- Pilih Buah -->
                <div class="form-group">
                    <label>Pilih Buah:</label>
                    <select id="pilihBuah" class="form-control">
                        <option value="">-- Pilih Buah --</option>
                    </select>
                </div>
                
                <!-- Pilih Satuan -->
                <div class="form-group">
                    <label>Pilih Satuan:</label>
                    <select id="pilihSatuan" class="form-control" onchange="updateHargaSatuan()">
                        <option value="1">Per Kilo (1 kg)</option>
                        <option value="0.5">Setengah Kilo (0.5 kg)</option>
                        <option value="0.25">Seperempat Kilo (0.25 kg)</option>
                    </select>
                </div>
                
                <!-- Info Harga -->
                <div class="info-box" id="infoHarga" style="text-align: center; font-weight: bold;">
                    Pilih buah untuk melihat harga
                </div>
                
                <!-- Jumlah -->
                <div class="form-group">
                    <label>Jumlah (dalam satuan yang dipilih):</label>
                    <input type="number" id="jumlahBeli" value="1" min="1">
                </div>
                
                <button class="btn btn-success" onclick="tambahTransaksi()">🛒 TAMBAH KE KERANJANG</button>
                
                <!-- Keranjang Belanja -->
                <h3 style="margin-top: 25px;">🛍️ KERANJANG BELANJA</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Buah</th>
                                <th>Satuan</th>
                                <th>Harga</th>
                                <th>Jml</th>
                                <th>Subtotal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="transaksiList"></tbody>
                    </table>
                </div>
                
                <!-- Total -->
                <div class="total-box">
                    <div class="grand-total">
                        <span>TOTAL:</span>
                        <span id="total">Rp 0</span>
                    </div>
                </div>
                
                <!-- Pembayaran -->
                <h3>💵 PEMBAYARAN</h3>
                <div class="kembalian-box">
                    <div class="form-group">
                        <label>Uang Dibayar:</label>
                        <input type="number" id="uangBayar" placeholder="Masukkan nominal" oninput="hitungKembalian()">
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 20px;">
                        <span>Kembalian:</span>
                        <span id="kembalian" style="font-weight: bold; color: #27ae60;">Rp 0</span>
                    </div>
                </div>
                
                <!-- Aksi -->
                <div class="aksi-group">
                    <button class="btn btn-warning" onclick="resetTransaksi()">🔄 RESET</button>
                    <button class="btn btn-success" onclick="selesaiTransaksi()">✅ SELESAI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA BUAH DENGAN 3 JENIS HARGA
        let produkList = [
            { 
                id: 1, 
                nama: 'Apel Fuji', 
                harga: {
                    kilo: 60000,
                    setengah: 35000,
                    seperempat: 18000
                },
                stok: 100,
                emoji: '🍎'
            },
            { 
                id: 2, 
                nama: 'Pir Madu', 
                harga: {
                    kilo: 40000,
                    setengah: 22000,
                    seperempat: 12000
                },
                stok: 100,
                emoji: '🍐'
            },
            { 
                id: 3, 
                nama: 'Jeruk Santang', 
                harga: {
                    kilo: 60000,
                    setengah: 35000,
                    seperempat: 18000
                },
                stok: 100,
                emoji: '🍊'
            },
            { 
                id: 4, 
                nama: 'Jeruk Mandarin', 
                harga: {
                    kilo: 50000,
                    setengah: 28000,
                    seperempat: 15000
                },
                stok: 100,
                emoji: '🍊'
            },
            { 
                id: 5, 
                nama: 'Jeruk Medan Besar', 
                harga: {
                    kilo: 35000,
                    setengah: 20000,
                    seperempat: 10000
                },
                stok: 100,
                emoji: '🍊'
            },
            { 
                id: 6, 
                nama: 'Jeruk Medan Kecil', 
                harga: {
                    kilo: 30000,
                    setengah: 17000,
                    seperempat: 9000
                },
                stok: 100,
                emoji: '🍊'
            },
            { 
                id: 7, 
                nama: 'Salak', 
                harga: {
                    kilo: 18000,
                    setengah: 10000,
                    seperempat: 5000
                },
                stok: 100,
                emoji: '🫘'
            },
            { 
                id: 8, 
                nama: 'Anggur Merah', 
                harga: {
                    kilo: 120000,
                    setengah: 65000,
                    seperempat: 35000
                },
                stok: 100,
                emoji: '🍇'
            },
            { 
                id: 9, 
                nama: 'Anggur Hijau', 
                harga: {
                    kilo: 120000,
                    setengah: 65000,
                    seperempat: 35000
                },
                stok: 100,
                emoji: '🍇'
            },
            { 
                id: 10, 
                nama: 'Buah Naga', 
                harga: {
                    kilo: 30000,
                    setengah: 17000,
                    seperempat: 9000
                },
                stok: 100,
                emoji: '🐉'
            },
            { 
                id: 11, 
                nama: 'Alpukat', 
                harga: {
                    kilo: 30000,
                    setengah: 17000,
                    seperempat: 9000
                },
                stok: 100,
                emoji: '🥑'
            },
            { 
                id: 12, 
                nama: 'Kelengkeng', 
                harga: {
                    kilo: 80000,
                    setengah: 45000,
                    seperempat: 25000
                },
                stok: 100,
                emoji: '🍒'
            },
            { 
                id: 13, 
                nama: 'Semangka', 
                harga: {
                    kilo: 15000,
                    setengah: 8000,
                    seperempat: 4000
                },
                stok: 100,
                emoji: '🍉'
            },
            { 
                id: 14, 
                nama: 'Melon', 
                harga: {
                    kilo: 21000,
                    setengah: 12000,
                    seperempat: 6000
                },
                stok: 100,
                emoji: '🍈'
            },
            { 
                id: 15, 
                nama: 'Pir Jambu', 
                harga: {
                    kilo: 60000,
                    setengah: 35000,
                    seperempat: 18000
                },
                stok: 100,
                emoji: '🍐'
            },
            { 
                id: 16, 
                nama: 'Nanas', 
                harga: {
                    kilo: 15000,
                    setengah: 8000,
                    seperempat: 4000
                },
                stok: 100,
                emoji: '🍍'
            }
        ];
        
        let transaksi = [];
        let nextId = 17;
        let filteredProduk = [...produkList];

        // Load data
        function loadData() {
            const savedData = localStorage.getItem('produkListVariatif');
            if (savedData) {
                produkList = JSON.parse(savedData);
                nextId = Math.max(...produkList.map(p => p.id)) + 1;
                filteredProduk = [...produkList];
            }
        }

        // Save data
        function saveData() {
            localStorage.setItem('produkListVariatif', JSON.stringify(produkList));
        }

        // Format Rupiah
        function formatRupiah(angka) {
            return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Render daftar buah
        function renderBuah() {
            const grid = document.getElementById('buahGrid');
            const select = document.getElementById('pilihBuah');
            
            grid.innerHTML = '';
            select.innerHTML = '<option value="">-- Pilih Buah --</option>';
            
            produkList.forEach(produk => {
                // Card view
                const card = document.createElement('div');
                card.className = 'buah-card';
                card.setAttribute('onclick', `pilihBuah(${produk.id})`);
                card.innerHTML = `
                    <div class="buah-emoji">${produk.emoji}</div>
                    <div class="buah-nama">${produk.nama}</div>
                    <div class="harga-info">
                        <div class="harga-item">1 kg: Rp ${formatRupiah(produk.harga.kilo)}</div>
                        <div class="harga-item">½ kg: Rp ${formatRupiah(produk.harga.setengah)}</div>
                        <div class="harga-item">¼ kg: Rp ${formatRupiah(produk.harga.seperempat)}</div>
                    </div>
                    <div style="margin-top: 8px; color: #666;">Stok: ${produk.stok} kg</div>
                `;
                grid.appendChild(card);
                
                // Select option
                const option = document.createElement('option');
                option.value = produk.id;
                option.textContent = `${produk.nama} (Stok: ${produk.stok} kg)`;
                select.appendChild(option);
            });
        }

        // Pilih buah
        function pilihBuah(id) {
            document.getElementById('pilihBuah').value = id;
            updateHargaSatuan();
            
            document.querySelectorAll('.buah-card').forEach(card => {
                card.classList.remove('selected');
            });
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('selected');
            }
        }

        // Update info harga berdasarkan satuan
        function updateHargaSatuan() {
            const buahId = parseInt(document.getElementById('pilihBuah').value);
            const satuan = parseFloat(document.getElementById('pilihSatuan').value);
            
            if (!buahId) {
                document.getElementById('infoHarga').innerHTML = 'Pilih buah untuk melihat harga';
                return;
            }
            
            const produk = produkList.find(p => p.id === buahId);
            if (!produk) return;
            
            let harga = 0;
            let satuanText = '';
            
            if (satuan === 1) {
                harga = produk.harga.kilo;
                satuanText = 'Per Kilo (1 kg)';
            } else if (satuan === 0.5) {
                harga = produk.harga.setengah;
                satuanText = 'Setengah Kilo (0.5 kg)';
            } else if (satuan === 0.25) {
                harga = produk.harga.seperempat;
                satuanText = 'Seperempat Kilo (0.25 kg)';
            }
            
            document.getElementById('infoHarga').innerHTML = `
                ${produk.nama} - ${satuanText}<br>
                Harga: Rp ${formatRupiah(harga)}
            `;
        }

        // Tambah buah baru
        function tambahBuah() {
            const nama = document.getElementById('namaBuah').value;
            const hargaKilo = parseInt(document.getElementById('hargaKilo').value);
            const hargaSetengah = parseInt(document.getElementById('hargaSetengah').value);
            const hargaSeperempat = parseInt(document.getElementById('hargaSeperempat').value);
            const stok = parseInt(document.getElementById('stokBuah').value);
            
            if (!nama || !hargaKilo || !hargaSetengah || !hargaSeperempat || !stok) {
                alert('Semua field harus diisi!');
                return;
            }
            
            produkList.push({
                id: nextId++,
                nama: nama,
                harga: {
                    kilo: hargaKilo,
                    setengah: hargaSetengah,
                    seperempat: hargaSeperempat
                },
                stok: stok,
                emoji: '🍌'
            });
            
            // Reset form
            document.getElementById('namaBuah').value = '';
            document.getElementById('hargaKilo').value = '';
            document.getElementById('hargaSetengah').value = '';
            document.getElementById('hargaSeperempat').value = '';
            document.getElementById('stokBuah').value = '100';
            
            saveData();
            renderBuah();
            alert('Buah berhasil ditambahkan!');
        }

        // Tambah ke transaksi
        function tambahTransaksi() {
            const buahId = parseInt(document.getElementById('pilihBuah').value);
            const satuan = parseFloat(document.getElementById('pilihSatuan').value);
            const jumlah = parseInt(document.getElementById('jumlahBeli').value);
            
            if (!buahId) {
                alert('Pilih buah dulu!');
                return;
            }
            
            if (jumlah <= 0) {
                alert('Jumlah harus lebih dari 0!');
                return;
            }
            
            const produk = produkList.find(p => p.id === buahId);
            
            // Hitung total kg yang digunakan
            const totalKg = satuan * jumlah;
            
            if (produk.stok < totalKg) {
                alert(`Stok tidak cukup! Tersedia: ${produk.stok} kg`);
                return;
            }
            
            // Kurangi stok
            produk.stok -= totalKg;
            
            // Dapatkan harga sesuai satuan
            let hargaSatuan = 0;
            let satuanText = '';
            
            if (satuan === 1) {
                hargaSatuan = produk.harga.kilo;
                satuanText = '1 kg';
            } else if (satuan === 0.5) {
                hargaSatuan = produk.harga.setengah;
                satuanText = '½ kg';
            } else {
                hargaSatuan = produk.harga.seperempat;
                satuanText = '¼ kg';
            }
            
            const subtotal = hargaSatuan * jumlah;
            
            transaksi.push({
                id: produk.id,
                nama: produk.nama,
                satuan: satuanText,
                hargaSatuan: hargaSatuan,
                jumlah: jumlah,
                subtotal: subtotal,
                emoji: produk.emoji
            });
            
            saveData();
            renderBuah();
            renderTransaksi();
            hitungTotal();
            
            document.getElementById('jumlahBeli').value = 1;
        }

        // Render transaksi
        function renderTransaksi() {
            const tbody = document.getElementById('transaksiList');
            tbody.innerHTML = '';
            
            if (transaksi.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Keranjang kosong</td></tr>';
                return;
            }
            
            transaksi.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.emoji} ${item.nama}</td>
                    <td>${item.satuan}</td>
                    <td>Rp ${formatRupiah(item.hargaSatuan)}</td>
                    <td>${item.jumlah}</td>
                    <td>Rp ${formatRupiah(item.subtotal)}</td>
                    <td><button class="btn btn-danger" style="padding: 5px 10px;" onclick="hapusItem(${index})">❌</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Hapus item
        function hapusItem(index) {
            const item = transaksi[index];
            
            // Hitung total kg yang dikembalikan
            let kgPerSatuan = 1;
            if (item.satuan === '½ kg') kgPerSatuan = 0.5;
            if (item.satuan === '¼ kg') kgPerSatuan = 0.25;
            
            const totalKg = kgPerSatuan * item.jumlah;
            
            const produk = produkList.find(p => p.id === item.id);
            if (produk) {
                produk.stok += totalKg;
            }
            
            transaksi.splice(index, 1);
            
            saveData();
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Hitung total
        function hitungTotal() {
            const total = transaksi.reduce((sum, item) => sum + item.subtotal, 0);
            document.getElementById('total').innerHTML = `Rp ${formatRupiah(total)}`;
            hitungKembalian();
        }

        // Hitung kembalian
        function hitungKembalian() {
            const uangBayar = parseInt(document.getElementById('uangBayar').value) || 0;
            const totalText = document.getElementById('total').innerHTML;
            const total = parseInt(totalText.replace(/[^0-9]/g, '')) || 0;
            
            const kembalian = uangBayar - total;
            
            if (uangBayar > 0) {
                if (kembalian >= 0) {
                    document.getElementById('kembalian').innerHTML = `Rp ${formatRupiah(kembalian)}`;
                    document.getElementById('kembalian').style.color = '#27ae60';
                } else {
                    document.getElementById('kembalian').innerHTML = `Kurang Rp ${formatRupiah(Math.abs(kembalian))}`;
                    document.getElementById('kembalian').style.color = '#e74c3c';
                }
            } else {
                document.getElementById('kembalian').innerHTML = 'Rp 0';
            }
        }

        // Reset transaksi
        function resetTransaksi() {
            if (transaksi.length > 0 && !confirm('Yakin reset keranjang?')) return;
            
            transaksi.forEach(item => {
                let kgPerSatuan = 1;
                if (item.satuan === '½ kg') kgPerSatuan = 0.5;
                if (item.satuan === '¼ kg') kgPerSatuan = 0.25;
                
                const totalKg = kgPerSatuan * item.jumlah;
                const produk = produkList.find(p => p.id === item.id);
                if (produk) produk.stok += totalKg;
            });
            
            transaksi = [];
            document.getElementById('uangBayar').value = '';
            
            saveData();
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Selesai transaksi
        function selesaiTransaksi() {
            if (transaksi.length === 0) {
                alert('Keranjang kosong!');
                return;
            }
            
            const uangBayar = parseInt(document.getElementById('uangBayar').value);
            const total = transaksi.reduce((sum, item) => sum + item.subtotal, 0);
            
            if (!uangBayar || uangBayar < total) {
                alert('Uang tidak cukup!');
                return;
            }
            
            const kembalian = uangBayar - total;
            
            // Buat struk
            let struk = '🥭 TOKO BUAH "HARGA VARIATIF" 🍍\n';
            struk += '================================\n';
            struk += new Date().toLocaleString('id-ID') + '\n';
            struk += '================================\n\n';
            
            transaksi.forEach(item => {
                struk += `${item.emoji} ${item.nama}\n`;
                struk += `${item.jumlah} x ${item.satuan} @Rp ${formatRupiah(item.hargaSatuan)} = Rp ${formatRupiah(item.subtotal)}\n`;
            });
            
            struk += '\n================================\n';
            struk += `TOTAL: Rp ${formatRupiah(total)}\n`;
            struk += `Bayar: Rp ${formatRupiah(uangBayar)}\n`;
            struk += `Kembali: Rp ${formatRupiah(kembalian)}\n`;
            struk += '================================\n';
            struk += 'Terima Kasih!\n';
            
            alert(struk);
            
            // Reset
            transaksi = [];
            document.getElementById('uangBayar').value = '';
            saveData();
            renderBuah();
            renderTransaksi();
            hitungTotal();
        }

        // Inisialisasi
        loadData();
        renderBuah();
        renderTransaksi();
        hitungTotal();
    </script>
</body>
</html>
